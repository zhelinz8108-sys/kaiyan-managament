<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>凯燕环球中心 - 登录</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f3ed;
        --panel: rgba(255, 255, 255, 0.92);
        --panel-border: rgba(39, 59, 53, 0.08);
        --text: #1f1a16;
        --muted: #8b7b6c;
        --accent: #1f7b84;
        --accent-strong: #155b61;
        --accent-soft: rgba(31, 123, 132, 0.12);
        --shadow: 0 28px 60px rgba(87, 64, 42, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(37, 108, 106, 0.12), transparent 30%),
          radial-gradient(circle at top right, rgba(213, 161, 101, 0.12), transparent 24%),
          linear-gradient(180deg, #fbf8f2 0%, var(--bg) 100%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .login-card {
        width: min(420px, 100%);
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        padding: 40px 34px 32px;
      }

      .brand {
        margin: 0 0 22px;
        font-size: 15px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
      }

      h1 {
        margin: 0;
        font-size: 40px;
        line-height: 1.02;
        letter-spacing: -0.05em;
      }

      form {
        margin-top: 30px;
      }

      .field {
        margin-bottom: 16px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 600;
        color: #5d4c3f;
      }

      input {
        width: 100%;
        border: 1px solid rgba(97, 79, 62, 0.12);
        background: rgba(255, 255, 255, 0.92);
        border-radius: 18px;
        padding: 15px 16px;
        font-size: 16px;
        color: var(--text);
        outline: none;
        transition: border-color 160ms ease, box-shadow 160ms ease;
      }

      input:focus {
        border-color: rgba(31, 123, 132, 0.34);
        box-shadow: 0 0 0 4px var(--accent-soft);
      }

      button {
        width: 100%;
        margin-top: 10px;
        appearance: none;
        border: none;
        border-radius: 999px;
        padding: 15px 18px;
        background: linear-gradient(135deg, var(--accent), #2b95a0);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 160ms ease, opacity 160ms ease, box-shadow 160ms ease;
        box-shadow: 0 18px 30px rgba(31, 123, 132, 0.18);
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
        transform: none;
      }

      .message {
        min-height: 24px;
        margin-top: 16px;
        font-size: 14px;
        color: #b24f42;
      }

      .message.success {
        color: #1d6f5b;
      }

      @media (max-width: 640px) {
        .login-card {
          padding: 32px 24px 24px;
          border-radius: 24px;
        }

        h1 {
          font-size: 34px;
        }
      }
    </style>
  </head>
  <body>
    <main class="login-card">
      <p class="brand">Kaiyan Host</p>
      <h1>登录</h1>

      <form id="login-form">
        <input id="next" type="hidden" />
        <div class="field">
          <label for="username">账号</label>
          <input id="username" name="username" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button id="submit" type="submit">进入后台</button>
        <div id="message" class="message"></div>
      </form>
    </main>

    <script>
      const form = document.getElementById("login-form");
      const submitButton = document.getElementById("submit");
      const messageElement = document.getElementById("message");
      const nextInput = document.getElementById("next");
      const params = new URLSearchParams(window.location.search);

      nextInput.value = params.get("next") || "/economics/";

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitButton.disabled = true;
        messageElement.textContent = "";
        messageElement.className = "message";

        const payload = {
          username: document.getElementById("username").value.trim(),
          password: document.getElementById("password").value,
          next: nextInput.value,
        };

        try {
          const response = await fetch("/api/v1/web-admin/session", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload),
          });

          const body = await response.json();
          if (!response.ok) {
            throw new Error(body?.message || "登录失败");
          }

          messageElement.textContent = "登录成功，正在进入后台...";
          messageElement.className = "message success";
          window.location.href = body.data?.redirect_to || "/economics/";
        } catch (error) {
          messageElement.textContent = error.message || "登录失败，请重试";
        } finally {
          submitButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
