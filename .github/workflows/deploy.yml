name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: kaiyan-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Load deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust Tencent server
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 124.223.31.175 >> ~/.ssh/known_hosts

      - name: Deploy latest main to Tencent Cloud
        run: |
          ssh ubuntu@124.223.31.175 'bash -s' <<'EOF'
          set -euo pipefail

          export NVM_DIR="$HOME/.nvm"
          if [ -s "$NVM_DIR/nvm.sh" ]; then
            . "$NVM_DIR/nvm.sh"
          fi

          mkdir -p /srv/kaiyan-managament
          cd /srv/kaiyan-managament

          if [ ! -d .git ]; then
            git init
            git remote add origin https://github.com/zhelinz8108-sys/kaiyan-managament.git
          fi

          git fetch origin main
          git reset --hard origin/main

          npm ci
          npm run prisma:generate
          npm run build

          pm2 restart kaiyan --update-env || pm2 start npm --name kaiyan -- start
          pm2 save

          sudo systemctl reload nginx
          EOF
