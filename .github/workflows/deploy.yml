name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: kaiyan-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build application
        run: npm run build

      - name: Run test suite
        run: npm test

      - name: Load deploy SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust Tencent server
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 124.223.31.175 >> ~/.ssh/known_hosts

      - name: Deploy latest main to Tencent Cloud
        run: |
          ssh ubuntu@124.223.31.175 'bash -s' <<'EOF'
          set -euo pipefail

          export NVM_DIR="$HOME/.nvm"
          if [ -s "$NVM_DIR/nvm.sh" ]; then
            . "$NVM_DIR/nvm.sh"
          fi

          mkdir -p /srv/kaiyan-managament
          cd /srv/kaiyan-managament

          if [ ! -d .git ]; then
            git init
            git remote add origin https://github.com/zhelinz8108-sys/kaiyan-managament.git
          fi

          git fetch origin main
          git reset --hard origin/main
          chmod +x scripts/deploy-production.sh
          APP_DIR=/srv/kaiyan-managament DEPLOY_BRANCH=main ./scripts/deploy-production.sh

          sudo systemctl reload nginx
          EOF
